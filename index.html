<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #faf9f6;
        --surface: #ffffff;
        --surface2: #f5f4f0;
        --border: #e8e5de;
        --border2: #d4d0c8;
        --text: #1a1917;
        --text2: #6b6760;
        --text3: #a09d98;
        --accent: #c17f3a;
        --accent2: #e8a84a;
        --accent-bg: #fdf6ec;
        --teal: #2d7d62;
        --teal-bg: #edf7f3;
        --red: #c13a3a;
        --red-bg: #fdf0f0;
        --purple: #6b3ac1;
        --purple-bg: #f5f0fd;
        --radius: 10px;
        --radius-lg: 16px;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
        min-height: 100vh;
      }
      h1,
      h2,
      h3 {
        font-family: "DM Serif Display", serif;
        font-weight: 400;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-logo {
        width: 36px;
        height: 36px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .header-logo svg {
        width: 20px;
        height: 20px;
        fill: white;
      }
      .header h1 {
        font-size: 18px;
        color: var(--text);
      }
      .header-nav {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }
      .nav-btn {
        padding: 8px 16px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        color: var(--text2);
        transition: all 0.15s;
      }
      .nav-btn:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .nav-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .main {
        flex: 1;
        padding: 24px;
        max-width: 880px;
        margin: 0 auto;
        width: 100%;
      }
      .page-title {
        font-size: 32px;
        margin-bottom: 6px;
        color: var(--text);
      }
      .page-sub {
        color: var(--text2);
        font-size: 14px;
        margin-bottom: 28px;
      }
      .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 16px;
      }
      .service-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 22px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .service-card:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 20px rgba(193, 127, 58, 0.12);
        transform: translateY(-1px);
      }
      .service-card.mattress:hover {
        border-color: var(--purple);
        box-shadow: 0 4px 20px rgba(107, 58, 193, 0.12);
      }
      .service-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--accent-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }
      .service-card.mattress .service-icon {
        background: var(--purple-bg);
      }
      .service-card h3 {
        font-family: "DM Serif Display", serif;
        font-size: 17px;
        font-weight: 400;
        color: var(--text);
      }
      .service-card p {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.5;
      }
      .service-arrow {
        color: var(--accent);
        font-size: 18px;
        margin-top: auto;
        align-self: flex-end;
      }
      .service-card.mattress .service-arrow {
        color: var(--purple);
      }
      .form-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .back-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text2);
        font-size: 18px;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .back-btn:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .form-title {
        font-size: 26px;
        color: var(--text);
      }
      .form-badge {
        font-size: 12px;
        background: var(--accent-bg);
        color: var(--accent);
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid rgba(193, 127, 58, 0.2);
      }
      .form-badge.purple {
        background: var(--purple-bg);
        color: var(--purple);
        border-color: rgba(107, 58, 193, 0.2);
      }
      .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 16px;
      }
      .form-section-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 16px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-bottom: 14px;
      }
      .form-row.three {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .form-row.single {
        grid-template-columns: 1fr;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .form-group label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text2);
      }
      .form-group input,
      .form-group select {
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: border 0.15s;
        width: 100%;
      }
      .form-group input:focus,
      .form-group select:focus {
        border-color: var(--accent);
      }
      .form-group input[readonly] {
        background: var(--surface2);
        color: var(--text2);
        cursor: default;
      }
      .calc-result {
        padding: 10px 12px;
        border: 1px dashed var(--border2);
        border-radius: var(--radius);
        background: var(--accent-bg);
        font-size: 14px;
        font-weight: 500;
        color: var(--accent);
      }
      .calc-result.purple {
        background: var(--purple-bg);
        color: var(--purple);
        border-color: rgba(107, 58, 193, 0.2);
      }
      .item-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1.2fr;
        gap: 10px;
        align-items: end;
        margin-bottom: 10px;
      }
      .item-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        padding: 10px 0;
      }
      .labour-row {
        display: grid;
        grid-template-columns: 2fr 2fr 1.2fr;
        gap: 10px;
        align-items: end;
        margin-bottom: 10px;
      }
      .totals-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 16px;
      }
      .total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        color: var(--text2);
      }
      .total-row:last-child {
        border: none;
      }
      .total-row.grand {
        font-size: 18px;
        font-family: "DM Serif Display", serif;
        color: var(--text);
        padding-top: 14px;
        margin-top: 4px;
        border-top: 2px solid var(--border);
      }
      .total-row span:last-child {
        font-weight: 500;
        color: var(--text);
      }
      .total-row.grand span:last-child {
        color: var(--accent);
        font-size: 20px;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      .btn {
        padding: 11px 22px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .btn-primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .btn-primary:hover {
        background: #b07234;
      }
      .btn-secondary {
        background: var(--surface);
        color: var(--text2);
      }
      .btn-secondary:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .btn-success {
        background: var(--teal);
        color: white;
        border-color: var(--teal);
      }
      .btn-success:hover {
        background: #256950;
      }
      .btn-outline {
        background: transparent;
        color: var(--text2);
      }
      .btn-outline:hover {
        background: var(--surface2);
      }
      .quote-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .quote-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 18px 20px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .quote-item:hover {
        border-color: var(--accent);
        background: var(--accent-bg);
      }
      .quote-avatar {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: var(--accent-bg);
        border: 1px solid rgba(193, 127, 58, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Serif Display", serif;
        font-size: 16px;
        color: var(--accent);
        flex-shrink: 0;
      }
      .quote-info {
        flex: 1;
      }
      .quote-name {
        font-weight: 500;
        font-size: 15px;
        margin-bottom: 2px;
      }
      .quote-meta {
        font-size: 12px;
        color: var(--text3);
      }
      .quote-total {
        font-family: "DM Serif Display", serif;
        font-size: 18px;
        color: var(--accent);
        text-align: right;
      }
      .quote-badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 20px;
        background: var(--surface2);
        color: var(--text2);
        display: inline-block;
        margin-top: 3px;
      }
      .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .search-bar input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border 0.15s;
      }
      .search-bar input:focus {
        border-color: var(--accent);
      }
      .customer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
      }
      .tab-group {
        display: flex;
        gap: 6px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }
      .tab {
        padding: 8px 16px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        color: var(--text2);
        transition: all 0.15s;
        background: transparent;
        font-family: "DM Sans", sans-serif;
      }
      .tab.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .tab.purple.active {
        background: var(--purple);
        border-color: var(--purple);
      }
      .step-selector {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-bottom: 0;
      }
      .step-option {
        border: 2px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .step-option:hover {
        border-color: var(--purple);
        background: var(--purple-bg);
      }
      .step-option.selected {
        border-color: var(--purple);
        background: var(--purple-bg);
      }
      .step-option .opt-icon {
        font-size: 32px;
        margin-bottom: 8px;
      }
      .step-option .opt-title {
        font-family: "DM Serif Display", serif;
        font-size: 18px;
        color: var(--text);
        margin-bottom: 4px;
      }
      .step-option .opt-sub {
        font-size: 12px;
        color: var(--text3);
      }
      .step-option.selected .opt-title {
        color: var(--purple);
      }
      .step-pills {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .step-pill {
        padding: 10px 20px;
        border-radius: 30px;
        border: 2px solid var(--border);
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: var(--text2);
        transition: all 0.15s;
        font-family: "DM Sans", sans-serif;
        background: var(--surface);
      }
      .step-pill:hover {
        border-color: var(--purple);
        color: var(--purple);
      }
      .step-pill.selected {
        border-color: var(--purple);
        background: var(--purple);
        color: white;
      }
      .info-box {
        padding: 12px 16px;
        border-radius: var(--radius);
        font-size: 13px;
        margin-bottom: 16px;
      }
      .info-box.purple {
        background: var(--purple-bg);
        border: 1px solid rgba(107, 58, 193, 0.15);
        color: var(--purple);
      }
      .info-box.teal {
        background: var(--teal-bg);
        border: 1px solid rgba(45, 125, 98, 0.15);
        color: var(--teal);
      }
      .info-box.amber {
        background: var(--accent-bg);
        border: 1px solid rgba(193, 127, 58, 0.15);
        color: var(--accent);
      }
      .step-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
      }
      .step-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--surface2);
        border: 2px solid var(--border2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        color: var(--text3);
        flex-shrink: 0;
      }
      .step-dot.active {
        background: var(--purple);
        border-color: var(--purple);
        color: white;
      }
      .step-dot.done {
        background: var(--teal);
        border-color: var(--teal);
        color: white;
      }
      .step-line {
        flex: 1;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
      }
      .step-line.done {
        background: var(--teal);
      }
      .quote-view-header {
        text-align: center;
        padding: 20px 0 24px;
        border-bottom: 2px solid var(--border);
        margin-bottom: 24px;
      }
      .quote-view-header .logo-text {
        font-family: "DM Serif Display", serif;
        font-size: 24px;
        color: var(--accent);
        margin-bottom: 4px;
      }
      .quote-view-header .sub {
        font-size: 12px;
        color: var(--text3);
      }
      .quote-meta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-bottom: 20px;
      }
      .meta-item .label {
        color: var(--text3);
        margin-bottom: 2px;
        font-size: 13px;
      }
      .meta-item .value {
        font-weight: 500;
        color: var(--text);
        font-size: 13px;
      }
      .breakdown-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 16px;
        font-size: 13px;
      }
      .breakdown-table th {
        text-align: left;
        padding: 8px 10px;
        background: var(--surface2);
        color: var(--text3);
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .breakdown-table td {
        padding: 9px 10px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }
      .breakdown-table td:last-child {
        text-align: right;
        font-weight: 500;
      }
      .breakdown-table tr:last-child td {
        border-bottom: none;
      }
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--text);
        color: #fff;
        padding: 12px 18px;
        border-radius: var(--radius);
        font-size: 13px;
        z-index: 999;
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.2s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--text3);
      }
      .empty-state .icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .labour-highlight {
        background: rgba(193, 127, 58, 0.04);
        border: 1px solid rgba(193, 127, 58, 0.15);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin-top: 4px;
      }

      /* ── CHANGE 3: Print CSS ─────────────────────────────────────────────── */
      @media print {
        /* Hide all interactive UI */
        .header,
        .actions,
        .no-print,
        button,
        input,
        select,
        .tab-group,
        .search-bar,
        .nav-btn,
        .back-btn,
        .step-indicator,
        .step-pills,
        .step-selector {
          display: none !important;
        }

        body {
          font-size: 12px;
          color: #000;
          background: #fff;
          margin: 0;
        }
        .app {
          min-height: unset;
        }

        /* Full-width print layout */
        .main {
          padding: 0;
          max-width: 100%;
          margin: 0;
        }
        .print-container {
          width: 100%;
          padding: 20px;
        }

        /* Cards: remove shadows, flatten for print */
        .form-card,
        .totals-card {
          border: 1px solid #ccc;
          border-radius: 0;
          margin-bottom: 12px;
          padding: 14px;
          page-break-inside: avoid;
          box-shadow: none;
        }

        /* Quote header: centered branding */
        .quote-view-header {
          padding: 12px 0 16px;
          border-bottom: 2px solid #000;
        }
        .quote-view-header .logo-text {
          font-size: 22px;
          color: #000;
        }
        .quote-view-header .sub {
          color: #555;
        }

        /* Meta grid — 2 columns on print */
        .quote-meta-grid {
          grid-template-columns: 1fr 1fr;
          gap: 8px;
          margin-bottom: 14px;
        }
        .meta-item .label {
          color: #666;
          font-size: 11px;
        }
        .meta-item .value {
          font-size: 13px;
          color: #000;
        }

        /* Breakdown table */
        .breakdown-table {
          border: 1px solid #ccc;
        }
        .breakdown-table th {
          background: #f0f0f0;
          color: #333;
          padding: 7px 8px;
        }
        .breakdown-table td {
          padding: 7px 8px;
          border-bottom: 1px solid #ddd;
          color: #000;
        }

        /* Total rows */
        .total-row {
          padding: 6px 0;
          border-bottom: 1px solid #ddd;
          font-size: 13px;
        }
        .total-row.grand {
          font-size: 16px;
          border-top: 2px solid #000;
          padding-top: 10px;
        }
        .total-row.grand span:last-child {
          color: #000;
          font-size: 18px;
        }

        /* Section titles */
        .form-section-title {
          color: #444;
          border-bottom: 1px solid #ccc;
          margin-bottom: 10px;
          padding-bottom: 6px;
        }

        /* Item rows in reupholstery — hide the grid layout, show as table-like */
        .item-row {
          display: grid;
          grid-template-columns: 2fr 1fr 1fr 1fr;
        }
        .calc-result {
          background: transparent;
          border: none;
          padding: 0;
          font-weight: 600;
        }

        /* Quotation list page: hide everything, only print if viewing a quote */
        .quote-list {
          display: none !important;
        }
      }

      @media (max-width: 600px) {
        .form-row,
        .form-row.three,
        .customer-grid,
        .item-row,
        .labour-row,
        .quote-meta-grid,
        .step-selector {
          grid-template-columns: 1fr;
        }
        .main {
          padding: 16px;
        }
        .header {
          padding: 12px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app"></div>
    <div class="toast" id="toast"></div>
    <script>
      const { jsPDF } = window.jspdf || {};

      function roundToCustomFeet(value) {
        const floor = Math.floor(value);
        const decimal = value - floor;
        if (decimal === 0) return floor;
        if (decimal <= 0.5) return floor + 0.5;
        return floor + 1;
      }

      function num(v) {
        const n = Number(v);
        return isNaN(n) ? 0 : n;
      }

      const MATTRESS_RATES = {
        "4inch": { "10year": 240, "15year": 290 },
        "6inch": { "10year": 310, "15year": 360 },
      };

      const REUPHOLSTERY_ITEMS = [
        { key: "sponge4", label: "4 inch સ્પંચ", unit: "feet(ફૂટ)" },
        { key: "sponge2", label: "2 inch ની સીટ", unit: "qty(નંગ)" },
        { key: "sponge1", label: "1 inch ની સીટ", unit: "qty(નંગ)" },
        { key: "stanzo", label: "15mm Stanzo(પેડિંગ)", unit: "meter(મીટર)" },
        { key: "fevicol", label: "Fevicol(ફેવિકોલ)", unit: "liter(લિટર)" },
        { key: "madarpate", label: "Madarpate(માદરપાટ)", unit: "meter(મીટર)" },
        { key: "kapad", label: "Kapad(કાપડ)", unit: "meter(મીટર)" },
        { key: "recron", label: "Recron(રેકરોન)", unit: "meter(મીટર)" },
        {
          key: "stapler",
          label: "Stapler Pin Box(સ્ટેપલર પિન)",
          unit: "qty(નંગ)",
        },
      ];

      const SERVICES = [
        {
          id: "structure",
          label: "સ્ટ્રક્ચર સાથે મઢવા માટે",
          sub: "Structure fabrication",
          icon: "🪑",
          desc: "નક્કી માપ અને સામગ્રીના દર સાથે સોફા ફ્રેમ બનાવો.",
        },
        {
          id: "upholstery",
          label: "માલસામાન સાથે મઢવા માટે",
          sub: "New fabric & foam fitting",
          icon: "🧵",
          desc: "નવા સોફા ફ્રેમ પર નવું ફોમ અને ફેબ્રિક લગાવો.",
        },
        {
          id: "reupholstery",
          label: "જૂના સોફા મઢવા માટે",
          sub: "Restore old sofas",
          icon: "♻️",
          desc: "નવી સામગ્રીને અલગ અલગ દર્શાવી સંપૂર્ણ રિફર્બિશમેન્ટ કરો.",
        },
        {
          id: "bed",
          label: "બેડ મઢવા માટે",
          sub: "Beds & headboards",
          icon: "🛏️",
          desc: "કસ્ટમ બેડ અને બેડ-બેક માપ.",
        },
        {
          id: "cover",
          label: "સોફા ના કવર માટે",
          sub: "Simple or sponge covers",
          icon: "🪢",
          desc: "સ્પોન્જ લાઇનિંગ સાથે અથવા સુરક્ષાત્મક અથવા સજાવટી કવર.",
        },
        {
          id: "mattress",
          label: "ગાદલા માટે",
          sub: "4 inch & 6 inch mattress",
          icon: "🛌",
          desc: "10 વર્ષ અથવા 15 વર્ષની વોરંટી વિકલ્પ સાથે કસ્ટમ ગાદલા કિંમતો.",
          isMattress: true,
        },
      ];

      // CHANGE 1: Added fevicol defaults to cover_sponge
      const DEFAULTS = {
        structure: { rate: 1950 },
        upholstery: { rate: 1250 },
        reupholstery: {
          sponge4_rate: 210,
          sponge2_rate: 1200,
          sponge1_rate: 600,
          stanzo_rate: 260,
          fevicol_rate: 350,
          madarpate_rate: 130,
          kapad_rate: 450,
          recron_rate: 120,
          stapler_rate: 40,
          labour: 0,
        },
        cover_simple: { kapad_rate: 450, labour: 1000 },
        // CHANGE 1: Added fevicol_rate and fevicol_qty to sponge cover defaults
        cover_sponge: {
          kapad_rate: 450,
          stanzo_rate: 260,
          fevicol_rate: 350,
          fevicol_qty: 0,
          labour: 1000,
        },
      };

      let state = {
        page: "home",
        selectedService: null,
        customerName: "",
        customerPhone: "",
        quotationDate: new Date().toISOString().split("T")[0],
        formData: {},
        commission: 0,
        gst: 0,
        discount: 0,
        quotations: JSON.parse(
          localStorage.getItem("sofa_quotations_v3") || "[]",
        ),
        viewQuote: null,
        coverType: "simple",
        bedType: "bed",
        mattressThickness: null,
        mattressWarranty: null,
        mattressStep: 1,
      };

      function calcReupholsteryMaterialCost(fd) {
        return REUPHOLSTERY_ITEMS.reduce((sum, item) => {
          return sum + num(fd[item.key + "_rate"]) * num(fd[item.key + "_qty"]);
        }, 0);
      }

      function calcSubtotal() {
        const fd = state.formData;
        const s = state.selectedService;
        if (s === "structure" || s === "upholstery")
          return num(fd.feet) * num(fd.rate);
        if (s === "reupholstery") {
          const matCost = calcReupholsteryMaterialCost(fd);
          const labour = num(fd.labour);
          return Number(matCost) + Number(labour);
        }
        if (s === "bed") return 0;
        if (s === "cover") {
          const kapad = num(fd.kapad_rate) * num(fd.kapad_meter);
          const stanzo =
            state.coverType === "sponge"
              ? num(fd.stanzo_rate) * num(fd.stanzo_meter)
              : 0;
          // CHANGE 1: Include fevicol in sponge cover subtotal
          const fevicol =
            state.coverType === "sponge"
              ? num(fd.fevicol_rate) * num(fd.fevicol_qty)
              : 0;
          return kapad + stanzo + fevicol + num(fd.labour);
        }
        if (s === "mattress") {
          const w = num(fd.width),
            h = num(fd.height),
            rate = num(fd.rate);
          if (!w || !h || !rate) return 0;
          return roundToCustomFeet((w * h) / 144) * rate;
        }
        return 0;
      }

      function calcTotals() {
        const sub = calcSubtotal();
        const commission = (sub * num(state.commission)) / 100;
        const afterComm = sub + commission;
        const disc = num(state.discount);
        const afterDisc = Math.max(0, afterComm - disc);
        const gstAmt = (afterDisc * num(state.gst)) / 100;
        const grand = afterDisc + gstAmt;
        return { sub, commission, afterComm, disc, afterDisc, gstAmt, grand };
      }

      function calcBreakdown() {
        const fd = state.formData;
        const s = state.selectedService;
        const items = [];
        if (s === "structure" || s === "upholstery") {
          items.push({
            label: "Size",
            value: `${num(fd.feet)} ft × ₹${num(fd.rate)}/ft`,
            amount: num(fd.feet) * num(fd.rate),
          });
        }
        if (s === "reupholstery") {
          REUPHOLSTERY_ITEMS.forEach((item) => {
            const r = num(fd[item.key + "_rate"]),
              q = num(fd[item.key + "_qty"]);
            if (r || q)
              items.push({
                label: item.label,
                value: `${q} ${item.unit} × ₹${r}`,
                amount: r * q,
              });
          });
          items.push({
            label: "Labour",
            value: "flat rate",
            amount: num(fd.labour),
          });
        }
        if (s === "cover") {
          const km = num(fd.kapad_meter),
            kr = num(fd.kapad_rate);
          if (km || kr)
            items.push({
              label: "Kapad(કાપડ)",
              value: `${km} m × ₹${kr}`,
              amount: km * kr,
            });
          if (state.coverType === "sponge") {
            const sm = num(fd.stanzo_meter),
              sr = num(fd.stanzo_rate);
            if (sm || sr)
              items.push({
                label: "Stanzo(પેડિંગ)",
                value: `${sm} m × ₹${sr}`,
                amount: sm * sr,
              });
            // CHANGE 1: Fevicol in breakdown
            const fq = num(fd.fevicol_qty),
              fr = num(fd.fevicol_rate);
            if (fq || fr)
              items.push({
                label: "Fevicol(ફેવિકોલ)",
                value: `${fq} liter × ₹${fr}`,
                amount: fq * fr,
              });
          }
          items.push({
            label: "Labour(મજૂરી)",
            value: "flat rate",
            amount: num(fd.labour),
          });
        }
        if (s === "bed") {
          items.push({
            label: state.bedType === "bed" ? "Bed" : "Bed Back",
            value: `H: ${fd.height || "—"} × W: ${fd.width || "—"}`,
            amount: null,
          });
        }
        if (s === "mattress") {
          const w = num(fd.width),
            h = num(fd.height),
            rate = num(fd.rate);
          const rawFeet = w && h ? (w * h) / 144 : 0;
          const rounded = rawFeet ? roundToCustomFeet(rawFeet) : 0;
          items.push({
            label: "Dimensions",
            value: `${w}" × ${h}"`,
            amount: null,
            info: true,
          });
          items.push({
            label: "Calculated Feet",
            value: `(${w}×${h})÷144=${fmt(rawFeet)} → rounded: ${rounded}`,
            amount: null,
            info: true,
          });
          items.push({
            label: "Rate",
            value: `₹${rate}/ft`,
            amount: null,
            info: true,
          });
          items.push({
            label: "Final Cost",
            value: `${rounded} ft × ₹${rate}`,
            amount: rounded * rate,
          });
        }
        return items;
      }

      function saveToLocalStorage() {
        localStorage.setItem(
          "sofa_quotations_v3",
          JSON.stringify(state.quotations),
        );
      }
      function saveQuotation() {
        const totals = calcTotals();
        const q = {
          id: Date.now().toString(),
          customerName: state.customerName || "Unknown",
          customerPhone: state.customerPhone || "",
          date: state.quotationDate,
          serviceType: state.selectedService,
          serviceLabel: SERVICES.find((s) => s.id === state.selectedService)
            ?.label,
          formData: { ...state.formData },
          coverType: state.coverType,
          bedType: state.bedType,
          mattressThickness: state.mattressThickness,
          mattressWarranty: state.mattressWarranty,
          commission: state.commission,
          gst: state.gst,
          discount: state.discount,
          breakdown: calcBreakdown(),
          totals,
        };
        state.quotations.unshift(q);
        saveToLocalStorage();
        showToast("Quotation saved!");
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2800);
      }

      function exportPDF(quote) {
        if (!jsPDF) {
          showToast("PDF loading, try again.");
          return;
        }
        const doc = new jsPDF(),
          t = quote.totals || {};
        let y = 20;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(20);
        doc.setTextColor(193, 127, 58);
        doc.text("SOFA CRAFT", 105, y, { align: "center" });
        y += 7;
        doc.setFontSize(10);
        doc.setTextColor(160, 157, 152);
        doc.setFont("helvetica", "normal");
        doc.text("Quotation System", 105, y, { align: "center" });
        y += 10;
        doc.setDrawColor(232, 229, 222);
        doc.line(15, y, 195, y);
        y += 8;
        doc.setFontSize(13);
        doc.setTextColor(26, 25, 23);
        doc.setFont("helvetica", "bold");
        doc.text("QUOTATION", 15, y);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.setTextColor(107, 103, 96);
        doc.text("Date: " + quote.date, 195, y, { align: "right" });
        y += 7;
        doc.text("Customer: " + quote.customerName, 15, y);
        if (quote.customerPhone)
          doc.text("Phone: " + quote.customerPhone, 195, y, { align: "right" });
        y += 5;
        doc.text(
          "Service: " + (quote.serviceLabel || quote.serviceType),
          15,
          y,
        );
        if (quote.serviceType === "mattress") {
          y += 5;
          doc.text(
            "Mattress: " +
              (quote.mattressThickness === "4inch" ? "4 Inch" : "6 Inch") +
              " | Warranty: " +
              (quote.mattressWarranty === "10year" ? "10-Year" : "15-Year"),
            15,
            y,
          );
        }
        y += 10;
        doc.line(15, y, 195, y);
        y += 8;
        doc.setFont("helvetica", "bold");
        doc.setTextColor(26, 25, 23);
        doc.text("Item", 15, y);
        doc.text("Details", 80, y);
        doc.text("Amount", 180, y, { align: "right" });
        y += 6;
        doc.setDrawColor(220, 216, 200);
        doc.line(15, y, 195, y);
        y += 6;
        doc.setFont("helvetica", "normal");
        doc.setTextColor(60, 55, 50);
        (quote.breakdown || []).forEach((item) => {
          if (item.info) {
            doc.setTextColor(140, 135, 130);
            doc.text(item.label, 15, y);
            doc.text((item.value || "").substring(0, 50), 80, y);
            y += 6;
            doc.setTextColor(60, 55, 50);
            return;
          }
          doc.text(item.label, 15, y);
          doc.text((item.value || "").substring(0, 40), 80, y);
          doc.text(item.amount != null ? "₹" + fmt(item.amount) : "—", 180, y, {
            align: "right",
          });
          y += 7;
        });
        y += 4;
        doc.line(15, y, 195, y);
        y += 8;
        [
          ["Subtotal", "₹" + fmt(t.sub)],
          ["Commission (" + quote.commission + "%)", "₹" + fmt(t.commission)],
          ["Discount", "- ₹" + fmt(t.disc)],
          ["GST (" + quote.gst + "%)", "₹" + fmt(t.gstAmt)],
        ].forEach(([l, v]) => {
          doc.setFontSize(10);
          doc.setTextColor(107, 103, 96);
          doc.text(l, 120, y);
          doc.text(v, 195, y, { align: "right" });
          y += 7;
        });
        doc.setFont("helvetica", "bold");
        doc.setFontSize(13);
        doc.setTextColor(193, 127, 58);
        doc.text("GRAND TOTAL", 120, y);
        doc.text("₹" + fmt(t.grand), 195, y, { align: "right" });
        y += 14;
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.setTextColor(160, 157, 152);
        doc.text("This is a computer-generated quotation.", 105, y, {
          align: "center",
        });
        doc.save(
          "quotation_" +
            quote.customerName.replace(/\s/g, "_") +
            "_" +
            quote.id +
            ".pdf",
        );
        showToast("PDF downloaded!");
      }

      function fmt(n) {
        return (Math.round(num(n) * 100) / 100).toLocaleString("en-IN", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }
      function fmtRaw(n) {
        return (Math.round(num(n) * 100) / 100).toString();
      }
      function esc(str) {
        if (!str) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function render() {
        document.getElementById("app").innerHTML =
          renderHeader() + '<div class="main">' + renderPage() + "</div>";
      }

      function renderHeader() {
        return `<header class="header no-print">
    <div class="header-logo"><svg viewBox="0 0 24 24"><path d="M2 9a2 2 0 012-2h2V5a1 1 0 011-1h10a1 1 0 011 1v2h2a2 2 0 012 2v7a2 2 0 01-2 2H4a2 2 0 01-2-2V9zm4 0H4v7h16V9h-2v1a1 1 0 01-1 1H7a1 1 0 01-1-1V9zm2-4v4h8V5H8z"/></svg></div>
    <h1>સોફા એસ્ટિમેટ</h1>
    <nav class="header-nav">
      <button class="nav-btn${state.page === "home" || state.page === "form" || state.page === "summary" ? " active" : ""}" onclick="navigate('home')">નવું કોટેશન</button>
      <button class="nav-btn${state.page === "quotes" || state.page === "view" ? " active" : ""}" onclick="navigate('quotes')">બધા(All) કોટેશન</button>
    </nav>
  </header>`;
      }

      function navigate(page) {
        if (page === "home") {
          state.page = "home";
          state.selectedService = null;
          state.formData = {};
          state.customerName = "";
          state.customerPhone = "";
          state.discount = 0;
          state.mattressThickness = null;
          state.mattressWarranty = null;
          state.mattressStep = 1;
        } else {
          state.page = page;
        }
        render();
      }

      function renderPage() {
        if (state.page === "home") return renderHome();
        if (state.page === "form") return renderForm();
        if (state.page === "summary") return renderSummary();
        if (state.page === "quotes") return renderQuotes();
        if (state.page === "view") return renderView();
        return "";
      }

      function renderHome() {
        return `<h2 class="page-title">નવુ ક્વોટેશન</h2>
  <p class="page-sub">Created by Prem Prajapati (નરેશભાઈ)</p>
  <div class="services-grid">
    ${SERVICES.map(
      (s) => `
    <div class="service-card${s.isMattress ? " mattress" : ""}" onclick="selectService('${s.id}')">
      <div class="service-icon">${s.icon}</div>
      <h3>${s.label}</h3><p>${s.desc}</p>
      <div class="service-arrow">→</div>
    </div>`,
    ).join("")}
  </div>`;
      }

      function selectService(id) {
        state.selectedService = id;
        state.mattressStep = 1;
        state.mattressThickness = null;
        state.mattressWarranty = null;
        if (id === "structure") state.formData = { ...DEFAULTS.structure };
        else if (id === "upholstery")
          state.formData = { ...DEFAULTS.upholstery };
        else if (id === "reupholstery")
          state.formData = { ...DEFAULTS.reupholstery };
        else if (id === "cover") {
          state.coverType = "simple";
          state.formData = { ...DEFAULTS.cover_simple };
        } else state.formData = {};
        state.page = "form";
        render();
      }

      function renderForm() {
        const svc = SERVICES.find((s) => s.id === state.selectedService);
        const isMatt = state.selectedService === "mattress";
        return `<div class="form-header no-print">
    <button class="back-btn" onclick="navigate('home')">←</button>
    <div><h2 class="form-title">${svc.label}</h2></div>
    <span class="form-badge${isMatt ? " purple" : ""}">${svc.icon} ${svc.sub}</span>
  </div>
  ${isMatt ? renderMattressFlow() : renderStandardForm()}`;
      }

      function renderStandardForm() {
        return `${renderCustomerSection()}
  ${renderServiceForm()}
  ${renderGlobalFields()}
  ${renderLiveTotalCard()}
  <div class="actions no-print">
    <button class="btn btn-primary" onclick="goToSummary()">Preview Quotation →</button>
    <button class="btn btn-secondary" onclick="navigate('home')">Cancel</button>
  </div>`;
      }

      function renderCustomerSection() {
        return `<div class="form-card">
    <div class="form-section-title">ગ્રાહક ની વિગતો</div>
    <div class="customer-grid">
      <div class="form-group"><label>ગ્રાહકનું નામ</label>
        <input type="text" value="${esc(state.customerName)}" placeholder="Enter name" oninput="state.customerName=this.value">
      </div>
      <div class="form-group"><label>ફોન નંબર</label>
        <input type="text" value="${esc(state.customerPhone)}" placeholder="Phone number" oninput="state.customerPhone=this.value">
      </div>
      <div class="form-group"><label>ક્વોટેશન તારીખ</label>
        <input type="date" value="${state.quotationDate}" oninput="state.quotationDate=this.value">
      </div>
    </div>
  </div>`;
      }

      function renderServiceForm() {
        const s = state.selectedService,
          fd = state.formData;

        if (s === "structure" || s === "upholstery") {
          const total = num(fd.feet) * num(fd.rate);
          return `<div class="form-card">
      <div class="form-section-title">માપ અને દર</div>
      <div class="form-row">
        <div class="form-group"><label>સોફાનું કદ(ફૂટ માં)</label>
          <input type="number" min="0" step="0.5" value="${fd.feet || ""}" placeholder="e.g. 7" oninput="updateFD('feet',this.value)">
        </div>
        <div class="form-group">
          <label>દર પ્રતિ ફૂટ (₹) <span style="color:var(--text3);font-size:11px">default ₹${s === "structure" ? 1950 : 1250}</span></label>
          <input type="number" min="0" value="${fd.rate || ""}" oninput="updateFD('rate',this.value)">
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group"><label>કુલ ટોટલ</label>
          <div class="calc-result" id="calc-simple">₹ ${fmt(total)}</div>
        </div>
      </div>
    </div>`;
        }

        if (s === "reupholstery") {
          const matCost = calcReupholsteryMaterialCost(fd);
          const labour = num(fd.labour);
          const total = Number(matCost) + Number(labour);
          return `<div class="form-card">
      <div class="form-section-title">Materials & Costs(સામગ્રી અને ખર્ચ)</div>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr;gap:10px;margin-bottom:10px">
        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Item</div>
        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Rate (₹)</div>
        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Qty / Unit</div>
        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Amount</div>
      </div>
      ${REUPHOLSTERY_ITEMS.map((item) => {
        const r = num(fd[item.key + "_rate"]),
          q = num(fd[item.key + "_qty"]);
        return `<div class="item-row">
          <div class="item-label">${item.label}<br><small style="color:var(--text3);font-size:11px">per ${item.unit}</small></div>
          <div class="form-group" style="margin:0">
            <input type="number" min="0" value="${fd[item.key + "_rate"] !== undefined ? fd[item.key + "_rate"] : ""}"
              placeholder="0" oninput="updateFD('${item.key}_rate',this.value)" style="padding:9px 10px">
          </div>
          <div class="form-group" style="margin:0">
            <input type="number" min="0" step="0.1" value="${fd[item.key + "_qty"] !== undefined ? fd[item.key + "_qty"] : ""}"
              placeholder="0" oninput="updateFD('${item.key}_qty',this.value)" style="padding:9px 10px">
          </div>
          <div class="calc-result" id="calc-${item.key}" style="padding:9px 10px;font-size:13px">₹${fmt(r * q)}</div>
        </div>`;
      }).join("")}
      <div style="border-top:1px dashed var(--border2);margin:10px 0 12px"></div>
      <div class="labour-highlight">
        <div class="labour-row">
          <div class="item-label" style="color:var(--accent);font-weight:600;padding:0">
            Labour(મજૂરી)
            <div style="font-size:11px;font-weight:400;color:var(--text3);margin-top:2px">flat rate (default: 0)</div>
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:11px">Amount (₹)</label>
            <input type="number" min="0" step="1" value="${fd.labour !== undefined ? fd.labour : 0}"
              placeholder="0" oninput="updateFD('labour',this.value)" style="padding:9px 10px">
          </div>
          <div class="calc-result" id="calc-labour" style="padding:9px 10px;font-size:13px">₹${fmt(labour)}</div>
        </div>
      </div>
      <div id="reup-summary" style="margin-top:12px;padding:10px 14px;background:var(--accent-bg);border-radius:var(--radius);border:1px solid rgba(193,127,58,.15);font-size:13px;color:var(--accent)">
        માલસામાન : ₹${fmt(matCost)} + મજૂરી : ₹${fmt(labour)} = <strong>₹${fmt(total)}</strong>
      </div>
    </div>`;
        }

        if (s === "bed") {
          return `<div class="form-card">
      <div class="form-section-title">Bed Type & Dimensions</div>
      <div class="tab-group">
        <button class="tab${state.bedType === "bed" ? " active" : ""}" onclick="state.bedType='bed';render()">Bed</button>
        <button class="tab${state.bedType === "bedback" ? " active" : ""}" onclick="state.bedType='bedback';render()">Bed Back</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Height</label><input type="text" value="${fd.height || ""}" placeholder="e.g. 36 inches" oninput="updateFD('height',this.value)"></div>
        <div class="form-group"><label>Width</label><input type="text" value="${fd.width || ""}" placeholder="e.g. 60 inches" oninput="updateFD('width',this.value)"></div>
      </div>
      <div class="info-box teal">Dimensions recorded — no cost calculation for bed making.</div>
    </div>`;
        }

        // CHANGE 1: Sofa Cover — Fevicol field added to sponge cover
        if (s === "cover") {
          const ct = state.coverType;
          const kapadAmt = num(fd.kapad_rate) * num(fd.kapad_meter);
          const stanzoAmt =
            ct === "sponge" ? num(fd.stanzo_rate) * num(fd.stanzo_meter) : 0;
          const fevicolAmt =
            ct === "sponge" ? num(fd.fevicol_rate) * num(fd.fevicol_qty) : 0;
          const labour = num(fd.labour);
          const total = kapadAmt + stanzoAmt + fevicolAmt + labour;
          return `<div class="form-card">
      <div class="form-section-title">Cover Type(કવરનો પ્રકાર)</div>
      <div class="tab-group">
        <button class="tab${ct === "simple" ? " active" : ""}" onclick="setCoverType('simple')">સાદા કવર</button>
        <button class="tab${ct === "sponge" ? " active" : ""}" onclick="setCoverType('sponge')">સ્પંચવાળા કવર</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>કાપડનો દર (₹/મીટર)</label>
          <input type="number" min="0" value="${fd.kapad_rate || ""}" placeholder="450" oninput="updateFD('kapad_rate',this.value)">
        </div>
        <div class="form-group"><label>કાપડ મીટર</label>
          <input type="number" min="0" step="0.1" value="${fd.kapad_meter || ""}" placeholder="0" oninput="updateFD('kapad_meter',this.value)">
        </div>
      </div>
      ${
        ct === "sponge"
          ? `
      <div class="form-row">
        <div class="form-group"><label>Stanzo(પેડિંગ) દર (₹/મીટર)</label>
          <input type="number" min="0" value="${fd.stanzo_rate || ""}" placeholder="260" oninput="updateFD('stanzo_rate',this.value)">
        </div>
        <div class="form-group"><label>Stanzo(પેડિંગ) મીટર</label>
          <input type="number" min="0" step="0.1" value="${fd.stanzo_meter || ""}" placeholder="0" oninput="updateFD('stanzo_meter',this.value)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Fevicol(ફેવિકોલ) દર (₹/લિટર) <span style="color:var(--text3);font-size:11px">default ₹350</span></label>
          <input type="number" min="0" value="${fd.fevicol_rate !== undefined ? fd.fevicol_rate : 350}" placeholder="350" oninput="updateFD('fevicol_rate',this.value)">
        </div>
        <div class="form-group"><label>Fevicol(ફેવિકોલ) લિટર</label>
          <input type="number" min="0" step="0.1" value="${fd.fevicol_qty !== undefined ? fd.fevicol_qty : 0}" placeholder="0" oninput="updateFD('fevicol_qty',this.value)">
        </div>
      </div>
`
          : ""
      }
      <div class="form-row">
        <div class="form-group"><label>Labour(મજૂરી) (₹)</label>
          <input type="number" min="0" value="${fd.labour || ""}" placeholder="1000" oninput="updateFD('labour',this.value)">
        </div>
        <div class="form-group"><label>Total (કુલ)</label>
          <div class="calc-result" id="calc-cover">₹ ${fmt(total)}</div>
        </div>
      </div>
      <div style="padding:10px 14px;background:var(--accent-bg);border-radius:var(--radius);border:1px solid rgba(193,127,58,.15);font-size:13px;color:var(--accent);margin-top:4px" id="cover-summary">
        માલસામાન : ₹${fmt(kapadAmt + stanzoAmt + fevicolAmt)} + મજૂરી : ₹${fmt(labour)} = <strong>₹${fmt(total)}</strong>
      </div>
    </div>`;
        }
        return "";
      }

      function renderGlobalFields() {
        return `<div class="form-card no-print">
    <div class="form-section-title">Adjustments(સમાયોજનો)</div>
    <div class="form-row three">
      <div class="form-group"><label>Commission (%)</label>
        <input type="number" min="0" max="100" step="0.5" value="${state.commission}" oninput="state.commission=this.value;refreshTotals()">
      </div>
      <div class="form-group"><label>GST (%)</label>
        <input type="number" min="0" max="100" step="0.5" value="${state.gst}" oninput="state.gst=this.value;refreshTotals()">
      </div>
      <div class="form-group"><label>Discount (₹)</label>
        <input type="number" min="0" value="${state.discount}" oninput="state.discount=this.value;refreshTotals()">
      </div>
    </div>
  </div>`;
      }

      function renderLiveTotalCard() {
        const t = calcTotals();
        return `<div class="totals-card" id="live-totals">
    <div class="form-section-title">Live Total</div>
    ${renderTotalRows(t)}
  </div>`;
      }

      function renderTotalRows(t) {
        return `<div class="total-row"><span>Subtotal</span><span>₹ ${fmt(t.sub)}</span></div>
  <div class="total-row"><span>Commission (${state.commission}%)</span><span>₹ ${fmt(t.commission)}</span></div>
  <div class="total-row"><span>Discount</span><span>- ₹ ${fmt(t.disc)}</span></div>
  <div class="total-row"><span>GST (${state.gst}%)</span><span>₹ ${fmt(t.gstAmt)}</span></div>
  <div class="total-row grand"><span>Grand Total</span><span>₹ ${fmt(t.grand)}</span></div>`;
      }

      function updateFD(key, value) {
        const parsed = value === "" ? "" : Number(value);
        state.formData[key] = isNaN(parsed) ? value : parsed;
        refreshTotals();
      }

      function refreshTotals() {
        const s = state.selectedService,
          fd = state.formData;

        if (s === "reupholstery") {
          REUPHOLSTERY_ITEMS.forEach((item) => {
            const el = document.getElementById("calc-" + item.key);
            if (el)
              el.textContent =
                "₹" +
                fmt(num(fd[item.key + "_rate"]) * num(fd[item.key + "_qty"]));
          });
          const labEl = document.getElementById("calc-labour");
          if (labEl) labEl.textContent = "₹" + fmt(num(fd.labour));
          const sumEl = document.getElementById("reup-summary");
          if (sumEl) {
            const matCost = calcReupholsteryMaterialCost(fd);
            const labour = num(fd.labour);
            // FIX: Clean Gujarati summary — only material total + labour, no sub-breakdown
            const total = Number(matCost) + Number(labour);
            sumEl.innerHTML = `માલસામાન : ₹${fmt(matCost)} + મજૂરી : ₹${fmt(labour)} = <strong>₹${fmt(total)}</strong>`;
          }
        }

        if (s === "structure" || s === "upholstery") {
          const el = document.getElementById("calc-simple");
          if (el) el.textContent = "₹ " + fmt(num(fd.feet) * num(fd.rate));
        }

        // CHANGE 1: Cover refresh includes fevicol
        if (s === "cover") {
          const kapad = num(fd.kapad_rate) * num(fd.kapad_meter);
          const stanzo =
            state.coverType === "sponge"
              ? num(fd.stanzo_rate) * num(fd.stanzo_meter)
              : 0;
          // FIX: num() guards prevent NaN; explicit Number() prevents string concat
          const fevicol =
            state.coverType === "sponge"
              ? num(fd.fevicol_rate) * num(fd.fevicol_qty)
              : 0;
          const labour = num(fd.labour);
          const matCost = Number(kapad) + Number(stanzo) + Number(fevicol);
          const total = matCost + labour;
          // FIX: Update calc-cover total chip
          const el = document.getElementById("calc-cover");
          if (el) el.textContent = "₹ " + fmt(total);
          // FIX: Update cover-summary with clean Gujarati format (no kapad/stanzo breakdown)
          const sumEl = document.getElementById("cover-summary");
          if (sumEl)
            sumEl.innerHTML = `માલસામાન : ₹${fmt(matCost)} + મજૂરી : ₹${fmt(labour)} = <strong>₹${fmt(total)}</strong>`;
        }

        if (s === "mattress") {
          const w = num(fd.width),
            h = num(fd.height),
            rate = num(fd.rate);
          const el = document.getElementById("mattress-calc-box");
          if (el && w && h) {
            const raw = (w * h) / 144;
            const rounded = roundToCustomFeet(raw);
            el.innerHTML = `<strong>Calculation:</strong> (${w} × ${h}) ÷ 144 = <strong>${fmtRaw(raw)} ft</strong>
        → Rounded: <strong>${rounded} ft</strong>
        → Cost: ${rounded} × ₹${rate} = <strong>₹${fmt(rounded * rate)}</strong>`;
          }
        }

        const ltEl = document.getElementById("live-totals");
        if (ltEl) {
          const t = calcTotals();
          ltEl.innerHTML =
            '<div class="form-section-title">Live Total</div>' +
            renderTotalRows(t);
        }
      }

      function setCoverType(t) {
        state.coverType = t;
        state.formData =
          t === "simple"
            ? { ...DEFAULTS.cover_simple }
            : { ...DEFAULTS.cover_sponge };
        render();
      }

      function renderMattressFlow() {
        const step = state.mattressStep;
        const ind = `<div class="step-indicator">
    <div class="step-dot ${step > 1 ? "done" : step === 1 ? "active" : ""}">1</div>
    <div class="step-line${step > 1 ? " done" : ""}"></div>
    <div class="step-dot ${step > 2 ? "done" : step === 2 ? "active" : ""}">2</div>
    <div class="step-line${step > 2 ? " done" : ""}"></div>
    <div class="step-dot ${step === 3 ? "active" : ""}">3</div>
  </div>`;
        if (step === 1) return renderMattressStep1(ind);
        if (step === 2) return renderMattressStep2(ind);
        if (step === 3) return renderMattressStep3(ind);
        return "";
      }

      function renderMattressStep1(ind) {
        return `${ind}<div class="form-card">
    <div class="form-section-title">Step 1 — Select Thickness(જાડાઈ)</div>
    <div class="step-selector">
      <div class="step-option${state.mattressThickness === "4inch" ? " selected" : ""}" onclick="selectMattressThickness('4inch')">
        <div class="opt-icon">🛌</div><div class="opt-title">4 Inch</div><div class="opt-sub">Standard comfort</div>
      </div>
      <div class="step-option${state.mattressThickness === "6inch" ? " selected" : ""}" onclick="selectMattressThickness('6inch')">
        <div class="opt-icon">🛏️</div><div class="opt-title">6 Inch</div><div class="opt-sub">Premium thick</div>
      </div>
    </div>
    ${state.mattressThickness ? `<div style="margin-top:16px"><button class="btn btn-primary" onclick="state.mattressStep=2;render()">Next: Warranty(વોરંટી) →</button></div>` : '<p style="font-size:13px;color:var(--text3);margin-top:16px">આગળ વધવા માટે જાડાઈ પસંદ કરો.</p>'}
  </div>`;
      }

      function renderMattressStep2(ind) {
        const thkLabel =
          state.mattressThickness === "4inch" ? "4 Inch" : "6 Inch";
        const rates = MATTRESS_RATES[state.mattressThickness];
        return `${ind}<div class="form-card">
    <div class="form-section-title">Step 2 — Warranty (${thkLabel})</div>
    <div class="step-pills">
      <button class="step-pill${state.mattressWarranty === "10year" ? " selected" : ""}" onclick="selectMattressWarranty('10year')">🛡️ 10-Year(વર્ષ) · ₹${rates["10year"]}/ft</button>
      <button class="step-pill${state.mattressWarranty === "15year" ? " selected" : ""}" onclick="selectMattressWarranty('15year')">🏅 15-Year(વર્ષ) · ₹${rates["15year"]}/ft</button>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="state.mattressStep=1;render()">← Back</button>
      ${state.mattressWarranty ? `<button class="btn btn-primary" onclick="state.mattressStep=3;render()">Next: Dimensions(માપ) →</button>` : ""}
    </div>
  </div>`;
      }

      function renderMattressStep3(ind) {
        const fd = state.formData;
        const thkLabel =
          state.mattressThickness === "4inch" ? "4 Inch" : "6 Inch";
        const warLabel =
          state.mattressWarranty === "10year" ? "10-Year" : "15-Year";
        const defaultRate =
          MATTRESS_RATES[state.mattressThickness][state.mattressWarranty];
        if (fd.rate === undefined) state.formData.rate = defaultRate;
        const w = num(fd.width),
          h = num(fd.height),
          rate = num(fd.rate || defaultRate);
        const rawFeet = w && h ? (w * h) / 144 : 0;
        const rounded = rawFeet ? roundToCustomFeet(rawFeet) : 0;
        const cost = rounded * rate;
        return `${ind}
  ${renderCustomerSection()}
  <div class="form-card">
    <div class="form-section-title">Step 3 — Dimensions & Calculation(ગણતરી)</div>
    <div class="info-box purple" style="margin-bottom:16px">
      <strong>${thkLabel} Mattress</strong> · <strong>${warLabel} Warranty</strong> · Default Rate(મૂળભૂત દર): ₹${defaultRate}/ft
    </div>
    <div class="form-row">
      <div class="form-group"><label>પહોળાઈ (ઇંચ)</label>
        <input type="number" min="0" step="0.5" value="${fd.width || ""}" placeholder="e.g. 60" oninput="updateFD('width',this.value)">
      </div>
      <div class="form-group"><label>લંબાઈ (ઇંચ)</label>
        <input type="number" min="0" step="0.5" value="${fd.height || ""}" placeholder="e.g. 72" oninput="updateFD('height',this.value)">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group"><label>દર પ્રતિ ફૂટ (₹)</label>
        <input type="number" min="0" value="${fd.rate || defaultRate}" oninput="updateFD('rate',this.value)">
      </div>
    </div>
    ${
      w && h
        ? `<div class="info-box amber" id="mattress-calc-box">
          <strong>Calculation:</strong> (${w} × ${h}) ÷ 144 = <strong>${fmtRaw(rawFeet)} ft</strong>
          → Rounded: <strong>${rounded} ft</strong>
          → Cost: ${rounded} × ₹${rate} = <strong>₹${fmt(cost)}</strong>
        </div>`
        : `<div class="info-box teal">Enter width and height to see live calculation.</div>`
    }
  </div>
  ${renderGlobalFields()}
  <div class="totals-card" id="live-totals">
    <div class="form-section-title">Live Total</div>
    ${renderTotalRows(calcTotals())}
  </div>
  <div class="actions no-print">
    <button class="btn btn-primary" onclick="goToSummary()">Preview Quotation →</button>
    <button class="btn btn-secondary" onclick="state.mattressStep=2;render()">← Back</button>
  </div>`;
      }

      function selectMattressThickness(t) {
        state.mattressThickness = t;
        state.mattressWarranty = null;
        state.formData = {};
        render();
      }
      function selectMattressWarranty(w) {
        state.mattressWarranty = w;
        state.formData = {
          ...state.formData,
          rate: MATTRESS_RATES[state.mattressThickness][w],
        };
        render();
      }

      // CHANGE 3: Summary wrapped in print-container for clean print output
      function renderSummary() {
        const svc = SERVICES.find((s) => s.id === state.selectedService);
        const t = calcTotals();
        const breakdown = calcBreakdown();
        const isMatt = state.selectedService === "mattress";
        return `<div class="form-header no-print">
    <button class="back-btn" onclick="state.page='form';render()">←</button>
    <h2 class="form-title">Quotation Preview</h2>
  </div>
  <div class="print-container">
    <div class="form-card">
      <div class="quote-view-header">
        <div class="logo-text">Sofa Craft</div>
        <div class="sub">Professional Quotation</div>
      </div>
      <div class="quote-meta-grid">
        <div class="meta-item"><div class="label">Customer</div><div class="value">${esc(state.customerName) || "—"}</div></div>
        <div class="meta-item"><div class="label">Phone</div><div class="value">${esc(state.customerPhone) || "—"}</div></div>
        <div class="meta-item"><div class="label">Date</div><div class="value">${state.quotationDate}</div></div>
        <div class="meta-item"><div class="label">Service</div><div class="value">${svc.icon} ${svc.label}</div></div>
        ${
          isMatt
            ? `<div class="meta-item"><div class="label">Mattress</div><div class="value">${state.mattressThickness === "4inch" ? "4 Inch" : "6 Inch"}</div></div>
        <div class="meta-item"><div class="label">Warranty</div><div class="value">${state.mattressWarranty === "10year" ? "10-Year" : "15-Year"}</div></div>`
            : ""
        }
      </div>
      <div class="form-section-title">Breakdown</div>
      <table class="breakdown-table">
        <thead><tr><th>Item</th><th>Details</th><th>Amount</th></tr></thead>
        <tbody>
          ${
            breakdown.length
              ? breakdown
                  .map(
                    (
                      item,
                    ) => `<tr style="${item.info ? "background:var(--surface2)" : ""}">
                <td style="${item.info ? "color:var(--text3)" : ""}">${esc(item.label)}</td>
                <td style="color:var(--text2);font-size:12px">${esc(item.value)}</td>
                <td>${item.amount != null ? "₹" + fmt(item.amount) : ""}</td>
              </tr>`,
                  )
                  .join("")
              : '<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:16px">No items entered</td></tr>'
          }
        </tbody>
      </table>
      <div class="form-section-title" style="margin-top:16px">Totals</div>
      ${renderTotalRows(t)}
    </div>
  </div>
  <div class="actions no-print">
    <button class="btn btn-primary" onclick="saveAndFinish()">Save Quotation</button>
    <button class="btn btn-success" onclick="window.print()">🖨 Print</button>
    <button class="btn btn-secondary" onclick="state.page='form';render()">← Edit</button>
  </div>`;
      }

      function goToSummary() {
        state.page = "summary";
        render();
      }
      function saveAndFinish() {
        saveQuotation();
        state.page = "quotes";
        render();
      }

      let searchQuery = "";
      function renderQuotes() {
        return `<h2 class="page-title">All Quotations</h2>
  <p class="page-sub">${state.quotations.length} quotation${state.quotations.length !== 1 ? "s" : ""} saved</p>
  <div class="search-bar">
    <input type="text" placeholder="Search by customer or service..." value="${esc(searchQuery)}"
      oninput="searchQuery=this.value;document.getElementById('qlist').innerHTML=renderFilteredQuotes()">
  </div>
  <div class="quote-list" id="qlist">${renderFilteredQuotes()}</div>`;
      }
      function renderFilteredQuotes() {
        const list = state.quotations.filter(
          (q) =>
            !searchQuery ||
            q.customerName.toLowerCase().includes(searchQuery.toLowerCase()) ||
            (q.serviceLabel || "")
              .toLowerCase()
              .includes(searchQuery.toLowerCase()),
        );
        if (!list.length)
          return `<div class="empty-state"><div class="icon">📋</div><p>${searchQuery ? "No results." : "No quotations yet."}</p></div>`;
        return list
          .map(
            (q) => `
    <div class="quote-item" onclick="viewQuote('${q.id}')">
      <div class="quote-avatar">${(q.customerName || "?")[0].toUpperCase()}</div>
      <div class="quote-info">
        <div class="quote-name">${esc(q.customerName)}</div>
        <div class="quote-meta">${q.date} · <span class="quote-badge">${esc(q.serviceLabel || q.serviceType)}</span></div>
      </div>
      <div style="text-align:right"><div class="quote-total">₹${fmt(q.totals?.grand || 0)}</div></div>
    </div>`,
          )
          .join("");
      }
      function viewQuote(id) {
        state.viewQuote = state.quotations.find((q) => q.id === id);
        state.page = "view";
        render();
      }

      // CHANGE 3: View quote also wrapped in print-container
      function renderView() {
        const q = state.viewQuote;
        if (!q) return "<p>Quotation not found.</p>";
        const t = q.totals || {};
        const svc = SERVICES.find((s) => s.id === q.serviceType);
        const isMatt = q.serviceType === "mattress";
        return `<div class="form-header no-print">
    <button class="back-btn" onclick="navigate('quotes')">←</button>
    <h2 class="form-title">Quotation Details</h2>
  </div>
  <div class="print-container">
    <div class="form-card">
      <div class="quote-view-header">
        <div class="logo-text">Sofa Craft</div>
        <div class="sub">Professional Quotation · #${q.id}</div>
      </div>
      <div class="quote-meta-grid">
        <div class="meta-item"><div class="label">Customer</div><div class="value">${esc(q.customerName)}</div></div>
        <div class="meta-item"><div class="label">Phone</div><div class="value">${esc(q.customerPhone) || "—"}</div></div>
        <div class="meta-item"><div class="label">Date</div><div class="value">${q.date}</div></div>
        <div class="meta-item"><div class="label">Service</div><div class="value">${svc ? svc.icon : ""} ${esc(q.serviceLabel || q.serviceType)}</div></div>
        ${
          isMatt
            ? `<div class="meta-item"><div class="label">Mattress</div><div class="value">${q.mattressThickness === "4inch" ? "4 Inch" : "6 Inch"}</div></div>
        <div class="meta-item"><div class="label">Warranty</div><div class="value">${q.mattressWarranty === "10year" ? "10-Year" : "15-Year"}</div></div>`
            : ""
        }
      </div>
      <div class="form-section-title">Breakdown</div>
      <table class="breakdown-table">
        <thead><tr><th>Item</th><th>Details</th><th>Amount</th></tr></thead>
        <tbody>
          ${
            (q.breakdown || [])
              .map(
                (
                  item,
                ) => `<tr style="${item.info ? "background:var(--surface2)" : ""}">
            <td style="${item.info ? "color:var(--text3)" : ""}">${esc(item.label)}</td>
            <td style="color:var(--text2);font-size:12px">${esc(item.value)}</td>
            <td>${item.amount != null ? "₹" + fmt(item.amount) : ""}</td>
          </tr>`,
              )
              .join() ||
            '<tr><td colspan="3" style="text-align:center;color:var(--text3)">No items</td></tr>'
          }
        </tbody>
      </table>
      <div class="form-section-title" style="margin-top:16px">Totals</div>
      <div class="total-row"><span>Subtotal</span><span>₹ ${fmt(t.sub)}</span></div>
      <div class="total-row"><span>Commission (${q.commission}%)</span><span>₹ ${fmt(t.commission)}</span></div>
      <div class="total-row"><span>Discount</span><span>- ₹ ${fmt(t.disc)}</span></div>
      <div class="total-row"><span>GST (${q.gst}%)</span><span>₹ ${fmt(t.gstAmt)}</span></div>
      <div class="total-row grand"><span>Grand Total</span><span>₹ ${fmt(t.grand)}</span></div>
    </div>
  </div>
  <div class="actions no-print">
    <button class="btn btn-primary" onclick="exportPDF(state.viewQuote)">⬇ Download PDF</button>
    <button class="btn btn-success" onclick="window.print()">🖨 Print</button>
    <button class="btn btn-secondary" onclick="deleteQuote('${q.id}')">🗑 Delete</button>
    <button class="btn btn-outline" onclick="navigate('quotes')">← Back</button>
  </div>`;
      }
      function deleteQuote(id) {
        state.quotations = state.quotations.filter((q) => q.id !== id);
        saveToLocalStorage();
        showToast("Deleted.");
        navigate("quotes");
      }

      render();
    </script>
  </body>
</html>
